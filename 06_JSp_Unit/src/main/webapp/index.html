<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>단위 변환기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&display=swap" rel="stylesheet">
<style>
* {
	 font-family: "Bitcount Prop Double Ink", system-ui;
  font-optical-sizing: auto;
}
/* 전체 화면 중앙 정렬 */
body {
	background-color: #f0f2f5;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	margin: 0;
}

/* 1:1 비율의 정사각형 컨테이너 */
.converter-card {
	background-color: #ffffff;
	width: 350px;
	height: 350px;
	padding: 30px;
	border-radius: 20px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
	/* 내부 요소 중앙 정렬 */
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	text-align: center;
	box-sizing: border-box;
}

h2 {
	margin-top: 0;
	margin-bottom: 25px;
	color: #333;
	font-size: 1.5rem;
}

form {
	width: 100%;
	display: flex;
	flex-direction: column;
	gap: 15px; /* 요소 사이 간격 */
}

label {
	font-size: 0.9rem;
	color: #666;
	font-weight: bold;
	margin-bottom: -10px; /* 라벨과 입력창 밀착 */
}

/* 입력창 및 셀렉트 박스 스타일 */
input, select {
	width: 100%;
	padding: 12px;
	border: 1px solid #ddd;
	border-radius: 8px;
	font-size: 1rem;
	text-align: center; /* 글씨 가운데 정렬 */
	box-sizing: border-box;
	transition: border-color 0.3s;
}

input:focus, select:focus {
	border-color: #4dabf7;
	outline: none;
}

/* 버튼 스타일 */
button {
	margin-top: 10px;
	width: 100%;
	padding: 12px;
	background-color: #4dabf7;
	color: white;
	border: none;
	border-radius: 8px;
	font-size: 1.1rem;
	font-weight: bold;
	cursor: pointer;
	transition: background 0.3s, transform 0.1s;
}

button:hover {
	background-color: #339af0;
}

button:active {
	transform: scale(0.98);
}
</style>
</head>
<body>

	<div class="converter-card">
		<h2>단위 변환기</h2>
		<form action="Change_output.jsp" method="post">
			<label>변환할 값</label> <input name="input" type="number" required
				placeholder="숫자 입력"> <label>변환 종류</label> <select
				name="choose">
				<option value="length">cm &rarr; inch</option>
				<option value="width">m&sup2; &rarr; 평</option>
				<option value="temp">&deg;C &rarr; &deg;F</option>
				<option value="speed">km/h &rarr; mi/h</option>
			</select>

			<button type="submit">변환하기</button>
		</form>
	</div>

</body>
</html>
