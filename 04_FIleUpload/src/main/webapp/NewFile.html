<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<!-- 
플젝 -> 빌드패스 -> lib(텝) 자르넣을때 갔었음
web(proj) -> web-inf -> lib 자르가 필요하면 여기다 넣으면 됌!
cos.jar 이걸 넣을 예정
파일 업로드가 필요한 경우 html에서 신경쓸건 단 2개
1. post로 요청 => 기본적으로 get 요청으로는 파일전송이 안됌, 어거지로 만들 수는 있지만 비효율적.
사진도 결국 데이터, 0과1로 이루어짐 . 
2. enctype(포장방식)을 multipart/form-data (박스포장)으로 바꿔줘야함
=> get post 어떤 요청이든 servlet으로 무언가를 실어나름. 간단한 문자열 데이터들은 상상이상 가벼움. 그러나 이미지 사진은 무겁기 때문에 포장을 덧 대어주는게 좋다




 -->
<form action="FileUpload" method="post" enctype="multipart/form-data">
이름 : <input name = "name">
사진 : <input name = "pic" type="file">
기타 : <input name = "etc" type="file">
<button>upload!!!</button>
</form>


</body>
</html>
